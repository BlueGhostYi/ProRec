optimizer:
  name: adam
  lr: 1.0e-3
  weight_decay: 0

train:
  epoch: 3000
  batch_size: 4096
  save_model: false
  loss: pairwise
  test_step: 3
  reproducible: true
  seed: 2025
  patience: 20

test:
  metrics: [recall, ndcg]
  k: [5, 10, 20]
  batch_size: 1024

data:
  type: general_cf
  name: amazon


model:
  name: lightgcn_promax
  type: discriminative
  # general parameters here
  keep_rate: 1.0
  embedding_size: 32

  # dataset-specific parameters here
  # for amazon
  amazon:
    layer_num: 3
    reg_weight: 1.0e-6
    sdr_weight: 1.5
    s2dr_weight: 0.05
  # for yelp
  yelp:
    layer_num: 3
    reg_weight: 1.0e-6
    sdr_weight: 0.5
    s2dr_weight: 0.1
  # for steam
  steam:
    layer_num: 3
    reg_weight: 1.0e-6
    sdr_weight: 0.5
    s2dr_weight: 0.1
