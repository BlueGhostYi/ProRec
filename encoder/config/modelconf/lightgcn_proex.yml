optimizer:
  name: adam
  lr: 1.0e-3
  weight_decay: 0

train:
  epoch: 3000
  batch_size: 4096
  save_model: false
  loss: pairwise
  test_step: 3
  reproducible: true
  seed: 2025
  patience: 20

test:
  metrics: [recall, ndcg]
  k: [10, 20]
  batch_size: 1024

data:
  type: general_cf
  name: amazon


model:
  name: lightgcn_proex
  type: discriminative
  # general parameters here
  keep_rate: 1.0
  profiles: 4
  embedding_size: 32

  # dataset-specific parameters here
  # for amazon
  amazon:
    layer_num: 3
    reg_weight: 1.0e-6
    num_envs: 4
    inv_weight: 10
    ex_weight: 0.4
    alpha: 0.1
  # for yelp
  yelp:
    layer_num: 3
    reg_weight: 1.0e-6
    num_envs: 3
    inv_weight: 10
    ex_weight: 0.4
    alpha: 0.1
  # for steam
  steam:
    layer_num: 3
    reg_weight: 1.0e-6
    num_envs: 2
    inv_weight: 10
    ex_weight: 2.0
    alpha: 0.1
